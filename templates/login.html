{% extends 'base.html' %}
{% block auth_content %}
<div class="min-vh-100 d-flex align-items-center justify-content-center" style="background: linear-gradient(135deg, #1a1f2e, #2d3548);">
  <div class="card p-4" style="width: 380px;">
    <div class="text-center mb-4">
      <i class="bi bi-building fs-1 text-primary"></i>
      <h4 class="mt-2">HotelSystem</h4>
      <p class="text-muted small">Sistema de Gestión Hotelera</p>
    </div>
    {% if form.errors %}
      <div class="alert alert-danger">Usuario o contraseña incorrectos.</div>
    {% endif %}
    <form method="post">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label">Usuario</label>
        <input type="text" name="username" class="form-control" placeholder="Ingresa tu usuario" required autofocus>
      </div>
      <div class="mb-3">
        <label class="form-label">Contraseña</label>
        <input type="password" name="password" class="form-control" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary w-100">Ingresar</button>
    </form>
  </div>
</div>
{% endblock %}
