{% extends 'base.html' %}
{% block title %}Nueva Reserva{% endblock %}
{% block page_title %}Nueva Reserva{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-7">
    <div class="card p-4">
      <form method="post" id="reservaForm">
        {% csrf_token %}
        <div class="row g-3">
          <div class="col-12">
            <label class="form-label">Buscar Huésped (Documento o Nombre)</label>
            <input class="form-control" list="huespedesList" name="huesped_doc" placeholder="Escribe para buscar..." required autocomplete="off">
            <datalist id="huespedesList">
              {% for h in huespedes %}
              <option value="{{ h.num_doc }}">{{ h.nombres }} {{ h.apellidos }}</option>
              {% endfor %}
            </datalist>
            <small class="text-muted">Si no existe, <a href="/huespedes/nuevo/" target="_blank">créalo aquí</a>.</small>
          </div>
          <div class="col-md-6">
            <label class="form-label">Fecha de entrada</label>
            <input type="date" name="fecha_entrada" id="fecha_entrada" class="form-control" required>
          </div>
          <div class="col-md-6">
            <label class="form-label">Fecha de salida</label>
            <input type="date" name="fecha_salida" id="fecha_salida" class="form-control" required>
          </div>
          <div class="col-md-12">
            <label class="form-label">Habitación (Disponibles)</label>
            <select name="habitacion" id="habitacion" class="form-select" required>
              <option value="" data-precio="0">Seleccionar habitación...</option>
              {% for h in habitaciones %}
              <option value="{{ h.id }}" data-precio="{{ h.tipo.precio_base }}">{{ h.numero }} — {{ h.tipo.nombre }} (S/. {{ h.tipo.precio_base }}/noche)</option>
              {% endfor %}
            </select>
          </div>
          <div class="col-md-6">
            <label class="form-label">N° adultos</label>
            <input type="number" name="num_adultos" class="form-control" value="1" min="1" required>
          </div>
          <div class="col-md-6">
            <label class="form-label">Origen</label>
            <select name="origen" class="form-select">
              <option value="DIRECTO">Directo</option>
              <option value="WEB">Web</option>
              <option value="AGENCIA">Agencia</option>
            </select>
          </div>
          <div class="col-12 mt-3">
            <div class="alert alert-info text-center fw-bold mb-0">
              Tarifa Calculada: S/. <span id="tarifa_calculada">0.00</span>
            </div>
          </div>
          <div class="col-12 mt-3">
            <button type="submit" class="btn btn-primary w-100"><i class="bi bi-check-lg me-1"></i>Crear reserva</button>
          </div>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.addEventListener("DOMContentLoaded", function() {
    const fEntrada = document.getElementById("fecha_entrada");
    const fSalida = document.getElementById("fecha_salida");
    const selectHab = document.getElementById("habitacion");
    const tarifaSpan = document.getElementById("tarifa_calculada");

    function calcularTarifa() {
        if (fEntrada.value && fSalida.value && selectHab.value) {
            const date1 = new Date(fEntrada.value);
            const date2 = new Date(fSalida.value);
            const diffTime = Math.abs(date2 - date1);
            let diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            
            if (diffDays <= 0 || isNaN(diffDays)) diffDays = 1;

            const selectedOption = selectHab.options[selectHab.selectedIndex];
            const precioBase = parseFloat(selectedOption.getAttribute('data-precio')) || 0;
            
            const total = diffDays * precioBase;
            tarifaSpan.textContent = total.toFixed(2);
        } else {
            tarifaSpan.textContent = "0.00";
        }
    }

    fEntrada.addEventListener("change", calcularTarifa);
    fSalida.addEventListener("change", calcularTarifa);
    selectHab.addEventListener("change", calcularTarifa);
});
</script>
{% endblock %}
