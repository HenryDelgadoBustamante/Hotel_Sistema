{% extends 'base.html' %}
{% block title %}Editar Reserva #{{ reserva.id }}{% endblock %}
{% block page_title %}Editar Reserva #{{ reserva.id }}{% endblock %}
{% block content %}
<div class="form-shell">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <a href="/reservas/{{ reserva.id }}/" class="btn btn-sm btn-outline-secondary"><i class="bi bi-arrow-left me-1"></i>Volver</a>
  </div>

  <form method="post" class="form-panel">
    {% csrf_token %}
    <div class="form-section-title">Datos de la Reserva</div>
    <div class="row g-3">
      <div class="col-md-6">
        <label class="form-label">Huésped</label>
        <select name="huesped_id" class="form-select" required>
          <option value="">Seleccionar huésped</option>
          {% for h in huespedes %}
          <option value="{{ h.id }}" {% if h.id == selected_huesped.id %}selected{% endif %}>{{ h.nombres }} {{ h.apellidos }} ({{ h.tipo_doc }}: {{ h.num_doc }})</option>
          {% endfor %}
        </select>
      </div>
      <div class="col-md-6">
        <label class="form-label">Habitación</label>
        <select name="habitacion" class="form-select" required id="selectHabitacion">
          <option value="">Seleccionar habitación</option>
          {% for h in habitaciones %}
          <option value="{{ h.id }}" {% if h.id == selected_habitacion_id %}selected{% endif %}>Hab. {{ h.numero }} - {{ h.tipo.nombre }} (S/. {{ h.tipo.precio_base }})</option>
          {% endfor %}
        </select>
      </div>
      <div class="col-md-4">
        <label class="form-label">Modalidad</label>
        <select name="modalidad" class="form-select" id="selectModalidad">
          <option value="DIA" {% if reserva.modalidad == 'DIA' %}selected{% endif %}>Por día</option>
          <option value="HORA" {% if reserva.modalidad == 'HORA' %}selected{% endif %}>Por horas</option>
        </select>
      </div>
      <div class="col-md-4">
        <label class="form-label">Fecha Entrada</label>
        <input type="date" name="fecha_entrada" class="form-control" value="{{ reserva.fecha_entrada|date:'Y-m-d' }}" id="inputFechaEntrada">
      </div>
      <div class="col-md-4">
        <label class="form-label">Fecha Salida</label>
        <input type="date" name="fecha_salida" class="form-control" value="{{ reserva.fecha_salida|date:'Y-m-d' }}" id="inputFechaSalida">
      </div>
      <div class="col-md-4" id="divHoraEntrada" style="display:none;">
        <label class="form-label">Fecha y Hora Entrada</label>
        <input type="datetime-local" name="fecha_hora_entrada" class="form-control" value="{{ hora_actual }}">
      </div>
      <div class="col-md-4" id="divDuracion" style="display:none;">
        <label class="form-label">Duración (horas)</label>
        <input type="number" name="duracion_horas" class="form-control" value="{{ reserva.duracion_horas }}" min="1" step="0.5">
      </div>
      <div class="col-md-4">
        <label class="form-label">N° Adultos</label>
        <input type="number" name="num_adultos" class="form-control" value="{{ reserva.num_adultos }}" min="1" max="10">
      </div>
      <div class="col-md-4">
        <label class="form-label">Origen</label>
        <select name="origen" class="form-select">
          <option value="DIRECTO" {% if reserva.origen == 'DIRECTO' %}selected{% endif %}>Directo</option>
          <option value="WEB" {% if reserva.origen == 'WEB' %}selected{% endif %}>Web</option>
          <option value="AGENCIA" {% if reserva.origen == 'AGENCIA' %}selected{% endif %}>Agencia</option>
        </select>
      </div>
      <div class="col-12">
        <label class="form-label">Observaciones</label>
        <textarea name="observaciones" class="form-control" rows="3">{{ reserva.observaciones }}</textarea>
      </div>
    </div>

    <div class="mt-4 d-flex justify-content-end gap-2">
      <a href="/reservas/{{ reserva.id }}/" class="btn btn-outline-secondary">Cancelar</a>
      <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg me-1"></i>Guardar Cambios</button>
    </div>
  </form>
</div>
{% endblock %}

{% block scripts %}
<script>
document.getElementById('selectModalidad').addEventListener('change', function() {
  const isHora = this.value === 'HORA';
  document.getElementById('divHoraEntrada').style.display = isHora ? 'block' : 'none';
  document.getElementById('divDuracion').style.display = isHora ? 'block' : 'none';
  document.getElementById('inputFechaEntrada').closest('.col-md-4').style.display = isHora ? 'none' : 'block';
  document.getElementById('inputFechaSalida').closest('.col-md-4').style.display = isHora ? 'none' : 'block';
});
</script>
{% endblock %}
