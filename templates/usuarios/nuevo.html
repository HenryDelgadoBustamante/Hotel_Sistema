{% extends 'base.html' %}
{% block title %}Nuevo Usuario{% endblock %}
{% block page_title %}Agregar Nuevo Usuario{% endblock %}

{% block content %}
<div class="row">
  <div class="col-md-6 mx-auto">
    <div class="card shadow-sm border-0">
      <div class="card-body">
        <form method="post">
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label text-muted small fw-bold">Nombre de usuario *</label>
            <input type="text" name="username" class="form-control" required>
          </div>
          
          <div class="mb-3">
            <label class="form-label text-muted small fw-bold">Contraseña *</label>
            <input type="password" name="password" class="form-control" required>
          </div>

          <div class="row mb-3">
            <div class="col">
              <label class="form-label text-muted small fw-bold">Nombres</label>
              <input type="text" name="nombres" class="form-control">
            </div>
            <div class="col">
              <label class="form-label text-muted small fw-bold">Apellidos</label>
              <input type="text" name="apellidos" class="form-control">
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label text-muted small fw-bold">Correo electrónico</label>
            <input type="email" name="email" class="form-control">
          </div>

          <div class="mb-4">
            <label class="form-label text-muted small fw-bold text-primary"><i class="bi bi-shield-lock me-1"></i>Asignación de Rol</label>
            <select name="rol" class="form-select">
              <option value="">-- Sin Rol Específico --</option>
              {% for g in grupos_disponibles %}
              <option value="{{ g.id }}">{{ g.name|title }}</option>
              {% endfor %}
            </select>
          </div>

          <div class="form-check form-switch mb-4">
            <input class="form-check-input" type="checkbox" name="is_active" id="isActive" checked>
            <label class="form-check-label" for="isActive">Usuario activo (puede iniciar sesión)</label>
          </div>

          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary px-4"><i class="bi bi-person-plus me-1"></i>Crear Usuario</button>
            <a href="{% url 'usuarios_lista' %}" class="btn btn-outline-secondary">Cancelar</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
